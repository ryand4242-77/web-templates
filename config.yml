# ============================================================
#  Davidson & Co. — Content Manager configuration
#  Login is handled by DecapBridge (replaces deprecated Netlify Identity).
#  The 3 values marked  <-- FROM DECAPBRIDGE  are filled in after you
#  sign up at decapbridge.com and connect this repo. See SETUP-GUIDE.md.
# ============================================================

backend:
  name: git-gateway
  repo: YOUR-USERNAME/YOUR-REPO            # <-- FROM DECAPBRIDGE (e.g. janedoe/davidsonco)
  branch: main
  identity_url: https://auth.decapbridge.com/sites/YOUR-SITE-ID   # <-- FROM DECAPBRIDGE
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

# Where uploaded photos are stored in the repo, and how the site links to them.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Friendly editing screens shown to the company admin.
collections:
  - name: "gallery"
    label: "Products / Gallery"
    description: "Add, edit, reorder, or remove the woodworking pieces shown on the site."
    files:
      - name: "products"
        label: "Gallery Products"
        file: "content/gallery.json"
        format: json
        fields:
          - label: "Products"
            name: "products"
            label_singular: "Product"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Photo", name: "image", widget: "image", required: false, hint: "Upload a photo of the piece. Leave empty to show a plain card." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Details (wood, size, etc.)", name: "meta", widget: "string", required: false }
              - { label: "Corner tag (e.g. Walnut)", name: "tag", widget: "string", required: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "About Photo & Display"
        file: "content/settings.json"
        format: json
        fields:
          - { label: "Woodworker photo (About page)", name: "maker_photo", widget: "image", required: false }
          - { label: "How many products to show on the page", name: "show_count", widget: "number", default: 6, value_type: "int", min: 1, hint: "Set this to the number of pieces you want visible. Increase it as you add more." }
